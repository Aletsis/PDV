name: CI/CD Pipeline - PDV System

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Definir permisos necesarios para interactuar con GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Trabajo 1: Integración Continua (Build, Format & Test)
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build, Format & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Código
      uses: actions/checkout@v4

    - name: Configurar SDK de .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restaurar Dependencias NuGet
      run: dotnet restore PDV.sln

    - name: Verificar Formato de Código (Linter)
      run: dotnet format --verify-no-changes --no-restore

    - name: Compilar Solución Completa
      run: dotnet build PDV.sln --configuration Release --no-restore

    - name: Ejecutar Pruebas Automatizadas (xUnit)
      run: dotnet test tests/PDV.Tests/PDV.Tests.csproj --configuration Release --no-build --verbosity normal

  # ─────────────────────────────────────────────────────────────
  # Trabajo 2: Compilación y Empaquetado del Agente de Hardware
  # ─────────────────────────────────────────────────────────────
  publish-hardware-agent:
    name: Publish Hardware Agent
    needs: build-and-test
    runs-on: windows-latest # Necesario para compilar binarios Win con dependencias locales seguras

    steps:
    - name: Checkout del Código
      uses: actions/checkout@v4

    - name: Configurar SDK de .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publicar Agente de Hardware para Windows (win-x64, Auto-contenido)
      run: |
        dotnet publish src/PDV.HardwareAgent/PDV.HardwareAgent.csproj -c Release -r win-x64 --self-contained true -o ./publish/agent-windows

    - name: Publicar Agente de Hardware para Linux (linux-x64, Auto-contenido)
      run: |
        dotnet publish src/PDV.HardwareAgent/PDV.HardwareAgent.csproj -c Release -r linux-x64 --self-contained true -o ./publish/agent-linux

    - name: Comprimir y Cargar Artefacto de Windows (win-x64)
      uses: actions/upload-artifact@v4
      with:
        name: PDV-HardwareAgent-Windows-x64
        path: ./publish/agent-windows/
        retention-days: 14

    - name: Comprimir y Cargar Artefacto de Linux (linux-x64)
      uses: actions/upload-artifact@v4
      with:
        name: PDV-HardwareAgent-Linux-x64
        path: ./publish/agent-linux/
        retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Trabajo 3: Construcción y Publicación de Contenedor Docker
  # ─────────────────────────────────────────────────────────────
  build-docker-image:
    name: Build & Publish Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del Código
      uses: actions/checkout@v4

    - name: Configurar QEMU (Soporte Multi-arquitectura)
      uses: actions/setup-qemu@v3

    - name: Configurar Docker Buildx
      uses: actions/setup-buildx@v3

    - name: Construir Imagen Docker Localmente (Prueba de integridad)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PDV.WebUI/Dockerfile
        push: false # Solo probar la construcción
        tags: pdv-webui:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # NOTA: Los siguientes pasos autentican y suben la imagen a GHCR si se activa en la rama principal.
    # Se añade condicional para evitar fallos si no se cuenta con los secretos habilitados.
    - name: Iniciar Sesión en GitHub Container Registry (GHCR)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Construir y Publicar Imagen Docker en GHCR
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PDV.WebUI/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/pdv-webui:latest
          ghcr.io/${{ github.repository }}/pdv-webui:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
