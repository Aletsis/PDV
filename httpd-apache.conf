# =============================================================
# Configuración Apache de Producción - Sistema PDV (Blazor Server)
# =================================────────────────============

# ─────────────────────────────────────────────────────────────
# Módulos Requeridos en Apache (Asegurar que estén habilitados)
# ─────────────────────────────────────────────────────────────
# LoadModule ssl_module modules/mod_ssl.so
# LoadModule proxy_module modules/mod_proxy.so
# LoadModule proxy_http_module modules/mod_proxy_http.so
# LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
# LoadModule rewrite_module modules/mod_rewrite.so
# LoadModule headers_module modules/mod_headers.so
# LoadModule deflate_module modules/mod_deflate.so

# Ocultar detalles de la versión del servidor web
ServerTokens ProductOnly
ServerSignature Off

# Habilitar compresión (mod_deflate)
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>

# ─────────────────────────────────────────────────────────────
# Redirección Permanente de HTTP (Puerto 80) a HTTPS (Puerto 443)
# ─────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName pdv.tuempresa.com
    DocumentRoot "/var/www/html"

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ─────────────────────────────────────────────────────────────
# Servidor Principal HTTPS (Puerto 443)
# ─────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName pdv.tuempresa.com
    DocumentRoot "/var/www/html"

    # Configuración de SSL/TLS
    SSLEngine on
    SSLCertificateFile "/etc/letsencrypt/live/pdv.tuempresa.com/fullchain.pem"
    SSLCertificateKeyFile "/etc/letsencrypt/live/pdv.tuempresa.com/privkey.pem"
    
    # Protocolos seguros y Cifrado Fuerte (Hardening)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # Cabeceras de Seguridad Críticas (Hardening)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://pdv.tuempresa.com ws://localhost:8181; frame-ancestors 'none';"

    # Configuración de logs
    ErrorLog ${APACHE_LOG_DIR}/pdv_error.log
    CustomLog ${APACHE_LOG_DIR}/pdv_access.log combined

    # ─────────────────────────────────────────────────────────
    # CONFIGURACIÓN CRÍTICA DE PROXY PARA BLAZOR (SignalR / WebSockets)
    # ─────────────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyRequests Off

    # Tiempos de espera altos para mantener vivos los WebSockets de Blazor
    ProxyTimeout 3600

    RewriteEngine On

    # Capturar solicitudes de actualización a WebSockets y enrutarlas por mod_proxy_wstunnel
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:5000/$1 [P,L]

    # Enrutar solicitudes HTTP ordinarias al backend Blazor
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # ─────────────────────────────────────────────────────────
    # Saltarse logs de auditoría para Health Checks constantes
    # ─────────────────────────────────────────────────────────
    SetEnvIf Request_URI "^/health/(live|ready)$" dontlog
    CustomLog ${APACHE_LOG_DIR}/pdv_access.log combined env=!dontlog
</VirtualHost>
