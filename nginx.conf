# =================================────────────────────────────
# Configuración Nginx de Producción - Sistema PDV (Blazor Server)
# =================================────────────────────────────

# Configuración global del worker y conexiones
worker_processes auto;
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimización de transferencia de datos
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off; # Ocultar versión de Nginx por seguridad

    # Habilitar compresión Gzip para mejorar tiempos de carga
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─────────────────────────────────────────────────────────
    # Zonas de Limitación de Tasa (Rate Limiting - DDoS Mitigación)
    # ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=pdv_limit:10m rate=30r/s;

    # Mapas para el soporte de WebSockets (Requerido para SignalR / Blazor Server)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────
    # Redirección de HTTP (Puerto 80) a HTTPS (Puerto 443)
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name pdv.tuempresa.com;

        # Redirigir todo el tráfico HTTP a HTTPS de manera permanente
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────────────
    # Servidor Principal HTTPS (Puerto 443)
    # ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name pdv.tuempresa.com;

        # Configuración de Certificados SSL (Let's Encrypt / Corporativos)
        ssl_certificate /etc/letsencrypt/live/pdv.tuempresa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pdv.tuempresa.com/privkey.pem;

        # Parámetros de seguridad SSL (Recomendados por Mozilla SSL Configuration Tool)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        # Optimización de sesiones SSL para mejorar la velocidad de Handshake
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Habilitar HSTS (HTTP Strict Transport Security) - Fuerza HTTPS por 1 año
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Cabeceras de Seguridad Críticas (Hardening)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://pdv.tuempresa.com ws://localhost:8181; frame-ancestors 'none';" always;

        # Configuración de Logs de Acceso y Errores
        access_log /var/log/nginx/pdv_access.log;
        error_log /var/log/nginx/pdv_error.log warn;

        # ─────────────────────────────────────────────────────
        # Ruteo y Proxy a la Aplicación ASP.NET Core Blazor
        # ─────────────────────────────────────────────────────
        location / {
            # Aplicar limitación de peticiones para mitigar ataques DDoS
            limit_req zone=pdv_limit burst=50 nodelay;

            # Pasar petición al contenedor/proceso de Blazor WebUI
            proxy_pass         http://127.0.0.1:5000;
            
            # Cabeceras estándar de Reverse Proxy
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # ── CONFIGURACIÓN CRÍTICA PARA WEBSOCKETS (SignalR) ──
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Ajuste de tiempos de espera para que la conexión de Blazor Server no se caiga por inactividad
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # Ajuste de buffers para soportar grandes encabezados HTTP en peticiones SignalR
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;
        }

        # Monitoreo del Endpoint de Health Check (Saltar logs para no saturar disco)
        location ~* ^/health/(live|ready)$ {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off; # Deshabilitar registro de logs en disco para health checks constantes
        }
    }
}
